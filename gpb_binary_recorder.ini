[params]
; 0 = enabled, 1 = disabled
disable=0

; telemetry sample rate requested from GP Bikes: 100, 50, 20, or 10
sample_rate=100

; optional. Leave blank to use <save path>\mxbmrp3_recordings
output_dir=

; 1 = safer but slower; 0 = faster
flush_each_event=0

; Automatically convert .mxbrec to PiBoSo-style CSV when RunDeinit fires
auto_convert=1

; Python launcher. Usually py or python
converter_python=py

; Full path to your converter script
converter_script=C:\Users\g04590\projects\GPBikesPluginLogger\mxbrec_gpb_to_piboso_csv_lap_scaled_v2.py

